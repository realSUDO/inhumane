services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  web:
    image: ghcr.io/${GITHUB_REPO}:web-latest
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://api:4000
    expose:
      - "3000"
    depends_on:
      - api

  api:
    image: ghcr.io/${GITHUB_REPO}:api-latest
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=4000
    expose:
      - "4000"
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inhumane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-inhumane}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  caddy_data:
  caddy_config:
  pg_data:
