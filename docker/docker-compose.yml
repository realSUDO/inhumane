services:
  web:
    image: ghcr.io/${GITHUB_REPO}:web-latest
    container_name: inhumane-web
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://api:4000
    expose:
      - "3000"
    networks:
      - default
      - global_proxy_net
    depends_on:
      - api

  api:
    image: ghcr.io/${GITHUB_REPO}:api-latest
    container_name: inhumane-api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=4000
      - REDIS_URL=redis://valkey:6379
    expose:
      - "4000"
    networks:
      - default
      - global_proxy_net
    depends_on:
      - postgres
      - valkey

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inhumane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-inhumane}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - valkey_data:/data

volumes:
  pg_data:
  valkey_data:

networks:
  default:
  global_proxy_net:
    external: true
