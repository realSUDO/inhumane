name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".vscode/**"

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/realsudo/inhumane

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'docker/Dockerfile'
              - 'pnpm-lock.yaml'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'docker/Dockerfile'
              - 'pnpm-lock.yaml'

  build:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      
      - name: Build and push Web
        if: needs.changes.outputs.web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: true
          tags: ${{ env.IMAGE_BASE }}:web-latest
          cache-from: type=gha,scope=build
          cache-to: type=gha,scope=build,mode=max

      - name: Build and push API
        if: needs.changes.outputs.api == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: api
          push: true
          tags: ${{ env.IMAGE_BASE }}:api-latest
          cache-from: type=gha,scope=build
          cache-to: type=gha,scope=build,mode=max

  deploy:
    needs: [changes, build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy deploy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker/docker-compose.yml,docker/inhumane.caddy"
          target: "~/inhumane"
          strip_components: 1
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/inhumane
            docker compose pull
            docker compose up -d --remove-orphans
            
            mkdir -p ~/global-proxy/sites
            cp ~/inhumane/inhumane.caddy ~/global-proxy/sites/inhumane.caddy
            docker exec global-proxy-caddy-1 caddy reload -c /etc/caddy/Caddyfile
            
            docker image prune -f
